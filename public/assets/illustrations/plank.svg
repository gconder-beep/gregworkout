<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
<title id="title">Forearm plank</title>
<desc id="desc">Stylized GregFit exercise illustration.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#eef8f5"/>
    <stop offset="100%" stop-color="#dfeeea"/>
  </linearGradient>
  <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#177f73"/>
    <stop offset="100%" stop-color="#0e5c55"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".14"/>
  </filter>
</defs>
<rect width="720" height="520" rx="36" fill="url(#bg)"/>
<ellipse cx="360" cy="466" rx="175" ry="22" fill="#17324d" opacity=".10"/>

