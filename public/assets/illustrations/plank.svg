  <path d="M278 248 L212 360" stroke="#14263b" stroke-width="26" stroke-linecap="round"/>
  <path d="M212 360 L152 360" stroke="#14263b" stroke-width="24" stroke-linecap="round"/>
  <path d="M458 320 L570 372" stroke="#14263b" stroke-width="32" stroke-linecap="round"/>
  <path d="M560 376 L612 394" stroke="#14263b" stroke-width="24" stroke-linecap="round"/>
  <path d="M190 174 L580 342" stroke="#ff8c5a" stroke-width="10" stroke-linecap="round"/>
  <text x="345" y="150" font-family="system-ui" font-size="28" fill="#14263b" font-weight="700">Straight line</text>
</g>
</svg>